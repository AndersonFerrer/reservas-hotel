spring.application.name=dubai

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:DubaiJwtSecretKeyForDevelopmentOnlyChangeThisValue}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS — lista separada por comas de origenes permitidos.
# Local dev: Angular en 4200, Vite/React en 5173, etc.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
